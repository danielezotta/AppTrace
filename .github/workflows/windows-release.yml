name: Windows Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Prepare version
        id: version
        shell: pwsh
        run: |
          $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$' | Select-Object -First 1
          if (-not $versionLine) {
            throw "Unable to find version in pubspec.yaml"
          }
          $version = $versionLine.Matches[0].Groups[1].Value.Trim().Split('+')[0]
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Parsed empty version from pubspec.yaml"
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Archive portable build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build\portable -Force | Out-Null
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\portable\AppTrace-${env:APP_VERSION}-windows-x64.zip -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          iscc /DEnvVersion=${env:APP_VERSION} windows\installer\apptrace.iss

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/portable/AppTrace-${{ steps.version.outputs.version }}-windows-x64.zip
            build/installer/AppTraceSetup-${{ steps.version.outputs.version }}.exe
